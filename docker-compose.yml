services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yamin_api
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://yaminbkk.truthtech.website/api
        VITE_TIKTOK_URL: ${VITE_TIKTOK_URL:-https://www.tiktok.com/@yaminbkk}
        VITE_MESSENGER_URL: ${VITE_MESSENGER_URL:-https://m.me/yaminbkk}
        VITE_TELEGRAM_URL: ${VITE_TELEGRAM_URL:-https://t.me/yaminbkk}
    container_name: yamin_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
